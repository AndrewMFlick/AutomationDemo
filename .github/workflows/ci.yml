name: CI
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo install cargo-nextest --locked
      - run: cargo nextest run --all
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  local-review-attestation:
    if: contains(github.event.pull_request.labels.*.name, 'security-review-required')
    runs-on: [self-hosted, foundry-local]
    env:
      LOCAL_BASE_URL: http://localhost:5273/v1
      LOCAL_MODEL:    qwen2.5-coder-1.5b-instruct-generic-gpu:4
    steps:
      - uses: actions/checkout@v4
      - name: Verify local reviewer model is loaded
        shell: pwsh
        run: |
          $ids = (Invoke-RestMethod "$env:LOCAL_BASE_URL/models" -TimeoutSec 15).data.id
          if ($ids -notcontains $env:LOCAL_MODEL) {
            Write-Error "Local model $env:LOCAL_MODEL is not available on Foundry Local"
            exit 1
          }
          Write-Host "Local reviewer model available: $env:LOCAL_MODEL"
      - name: Adversarial review (local, on-device)
        shell: pwsh
        run: |
          $diff = git diff "origin/${{ github.event.pull_request.base.ref }}...HEAD"
          if ([string]::IsNullOrWhiteSpace($diff)) { $diff = "(no diff)" }
          if ($diff.Length -gt 6000) { $diff = $diff.Substring(0, 6000) }
          $body = @{
            model    = $env:LOCAL_MODEL
            messages = @(
              @{ role = "system"; content = "You are an adversarial security reviewer for a Rust port of Apple's HAP spec. Flag memory-safety, crypto, and spec-compliance risks in 3-5 concise bullets. No preamble." },
              @{ role = "user";   content = "Review this diff:`n`n$diff" }
            )
            stream     = $false
            max_tokens = 400
            temperature = 0.2
          } | ConvertTo-Json -Depth 6
          $resp = Invoke-RestMethod "$env:LOCAL_BASE_URL/chat/completions" -Method Post -Body $body -ContentType 'application/json' -TimeoutSec 180
          Write-Host $resp.choices[0].message.content
