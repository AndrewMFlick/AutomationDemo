name: Local Security Hardening Review [Foundry Local]
description: On-device reviewer, air-gapped, grounded on the Apache-2.0 reference
labels: [area:model, model:fine-tuned, compliance, security-review-required]
body:
  - type: input
    id: pr
    attributes:
      label: PR number to review
  - type: textarea
    id: instructions
    attributes:
      value: |
        Scan the PR's security-critical Rust for hardening issues (memory safety,
        panics, crypto misuse, input validation), grounded in the canonical
        HAP-NodeJS reference implementation.
        MODEL: qwen2.5-coder-1.5b-instruct-generic-gpu:4 on Foundry Local.
        GROUNDING: Apache-2.0 HAP-NodeJS reference (NOT Apple's Non-Commercial spec).
        RUNTIME: self-hosted runner, offline. Reference and code MUST NOT leave the box.
